<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L3oN | Cloning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            padding-top: 200px;
        }
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgb(29, 41, 61);
            color: white;
            width: 300px;
            height: 300px;
            border: 5px dashed rgb(98, 116, 142);
            border-radius: 30px;
        }

        .container i {
            font-size: 34px;
            margin-bottom: 5px;
        }

        .container:hover {
            border: 5px dashed #6C0BD2;
            color: #6C0BD2;
            transform: translateY(-4px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <i class="fas fa-envelope"></i>
