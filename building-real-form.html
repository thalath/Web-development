<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            padding-top: 200px;
        }
        fieldset {
            display: flex;
            border-radius: 20px;
            width: 550px;
            padding: 10px;
            background-color: #555;
            box-shadow: 0 0 20px 5px rgba(0, 0, 0, 0.5);
            
        }

        h2 {
            margin-bottom: 20px;
            color: white;
        }
        label {
            color: white;
        }

        .form-input {
            padding: 10px;
            width: 250px;
            border-radius: 5px;
            border: none;
            margin: 5px 5px;
            background-color: #222222;
        }

        .input-box {
            display: flex;
            flex-direction: column;
        }

        .form-container {
            display: flex;
            margin-bottom: 10px;
        }

        .input-box label {
            font-family: Arial;
            font-size: 0.9rem;
            color: #aaa;
            padding-left: 5px;
        }

        .check-dialog {
            display: flex;
            background-color: #222222;
            padding: 10px;
            width: 250px;
            border-radius: 6px;
            margin: 0px 5px;
        }

        .member-title {
            font-family: Arial;
            font-size: 0.9rem;
            color: #aaa;
            padding-left: 5px;
        }

        button {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-weight: 600;
        }

        button[type="submit"] {
            width: 80%;
            padding: 8px 0;
            border-radius: 5px;
            border: none;
            background-color: rgb(255, 30, 150);
            color: white;
            margin: 10px 0;
        }
        
        button[type="reset"] {
            width: 18%;
            padding: 8px 0;
            background-color: #000ff0;
            color: #fff;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            transform: translateY(-3px);
            background-color: rgb(255, 50, 200);
            
            transition: all 0.3s ease;
        }

        .form-input {
            outline-color: #FF1033;
            border: none;
        }

    </style>
</head>
<body>
    <fieldset>
        <form action="">
            <h2><i class="fa-solid fa-user-plus"></i> New User Registration</h2>

            <div class="form-container">
                <div class="input-box">
                    <label for="fullname">Full Name: </label>
                    <input type="text" id="fullname" placeholder="John Doe" class="form-input">
                </div>

                <div class="input-box">
                    <label for="email">Email: </label>
                    <input type="email" id="email" placeholder="johndoe@gmail.com" class="form-input">
                </div>
            </div>

            <label class="member-title">Membership</label>
            <div class="form-container">
                <div class="check-dialog">
                    <input type="radio" name="membership" id="membership" checked>
                    <label for="membership" > Free</label>
                </div>
                <div class="check-dialog">
                    <input type="radio" name="membership" id="pro">
                    <label for="pro" > Pro(10$)</label>
                </div>
            </div><br>

            <input type="checkbox" name="" id="checkbox">
            <label for="checkbox">I agree <a href="#">Term</a></label><br>
            <div>
                <button type="submit">Register Now</button>
                <button type="reset">Reset</button>
            </div>
        </form>
    </fieldset>
</body>
</html>
