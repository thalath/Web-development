<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form | L3oN</title>
    <link rel="stylesheet" href="./assets/cotact-style.css">
</head>
<body>

    <form action="" method="post">
        <h2>Enter Your Scores</h2>
        <div>
            <label for="fullName">Full Name</label>
            <input type="text" name="fullname" id="fullName" placeholder="First and Last name"/>
        </div>

        <div>
            <label for="username">System Analysis and Design</label>
            <input type="text" name="usename" id="usename" placeholder="SAD">
        </div>

        <div>
            <label for="email">C/C++ Plus Programming</label>
            <input type="email" name="email" id="email" placeholder="1 to 100">
        </div>

        <div>
            <label for="password">Python Programming</label>
            <input type="password" name="password" id="password" placeholder="1 to 100">
        </div>

        <div class="confirm-pass-group">
            <label for="c_passowrd">C# Programming</label>
            <input type="password" name="" id="c_password" placeholder="1 to 100">
        </div>

        <div class="person-profile">
            <label for="photo">Photo</label>
            <input type="file" name="file" id="photo">
        </div>
        <button type="submit">Submit</button>
        <div class="back"><a href="./login-form.html">Back to Login Form</a></div>

    </form>
    
</body>
</html>
