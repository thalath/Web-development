<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form | L3oN</title>
    <link rel="stylesheet" href="./assets/cotact-style.css">
</head>
<body>

    <form action="" method="post">
        <h2>Personal Info</h2>
        <div>
            <label for="fullName">Full Name</label>
            <input type="text" name="fullname" id="fullName"/>
        </div>

        <div>
            <label for="username">Username</label>
            <input type="text" name="usename" id="usename" placeholder="Username">
        </div>

        <div>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="sample@gmail.com">
        </div>

        <div>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Password">
        </div>

        <div class="confirm-pass-group">
            <label for="c_passowrd">Confirm Password</label>
            <input type="password" name="" id="c_password" placeholder="Cofirm Password">
        </div>

        <div class="person-profile">
            <label for="photo">Photo</label>
            <input type="file" name="file" id="photo">
        </div>
        <button type="submit">Submit</button>
        <div class="back"><a href="./login-form.html">Back to Login Form</a></div>

    </form>
    
</body>
</html>
